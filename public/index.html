<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ejecución</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06060b;--card:#0e0e18;--sf:#131322;--bd:#1a1a30;--bd2:#252540;--tx:#e8eaf0;--t2:#b0b4c0;--mt:#6b7280;--dm:#40445a;--ac:#d4a017;--ac2:#f5d060;--gn:#22c55e;--gn2:#4ade80;--bl:#3b82f6;--pp:#818cf8;--rd:#ef4444;--am:#f59e0b;--teal:#14b8a6}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--tx);line-height:1.5;-webkit-font-smoothing:antialiased;font-size:13px;overflow-x:hidden}
button,input,textarea,select{font-family:inherit}a{color:var(--pp);text-decoration:none}

/* ── Nav ── */
.nav{background:var(--sf);border-bottom:1px solid var(--bd);padding:0 24px;height:48px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100}
.n-brand{font-size:15px;font-weight:800;color:#fff}.n-brand span{color:var(--ac)}
.n-sep{width:1px;height:16px;background:var(--bd)}
.n-date{color:var(--dm);font-size:11px;font-weight:500}
.n-tabs{margin-left:auto;display:flex;gap:2px}
.n-tab{background:none;border:1px solid transparent;color:var(--dm);padding:4px 14px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer}
.n-tab:hover{color:var(--t2)}
.n-tab.on{background:var(--ac);color:#0a0a0f;border-color:var(--ac)}
.n-user{position:relative;margin-left:8px}
.n-ubtn{background:var(--bd);border:none;color:var(--t2);padding:4px 12px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px}
.n-udd{display:none;position:absolute;top:calc(100% + 4px);right:0;background:var(--sf);border:1px solid var(--bd);border-radius:6px;min-width:160px;z-index:200;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.n-udd.open{display:block}
.n-udd a{display:block;padding:8px 14px;font-size:12px;color:var(--t2);text-decoration:none}
.n-udd a:hover{background:var(--bd)}
.n-upload{background:none;border:1px solid var(--bd);color:var(--dm);padding:3px 10px;border-radius:4px;font-size:10px;cursor:pointer;margin-left:4px}

/* ── Global Progress ── */
.gprog{background:var(--sf);border-bottom:1px solid var(--bd);padding:14px 24px;display:flex;align-items:center;gap:14px}
.gp-info{display:flex;align-items:baseline;gap:6px}
.gp-num{font-size:28px;font-weight:900;color:var(--ac);line-height:1}
.gp-of{font-size:14px;font-weight:600;color:var(--dm)}
.gp-label{font-size:11px;color:var(--mt);margin-left:4px}
.gp-bar{flex:1;height:10px;background:var(--bd);border-radius:5px;overflow:hidden}
.gp-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--ac),var(--gn));transition:.5s ease}
.gp-pct{font-size:15px;font-weight:800;color:var(--gn);min-width:44px;text-align:right}

/* ── Metrics ── */
.metrics{display:grid;grid-template-columns:repeat(6,1fr);border-bottom:1px solid var(--bd)}
.m{background:var(--sf);padding:10px 6px;text-align:center;border-right:1px solid var(--bd)}.m:last-child{border:none}
.m-v{font-size:18px;font-weight:800;line-height:1}
.m-l{font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--dm);margin-top:2px}
.mc0{color:var(--dm)}.mc1{color:var(--am)}.mc2{color:var(--pp)}.mc3{color:var(--gn)}.mc4{color:var(--ac)}.mc5{color:var(--teal)}

/* ── FULL WIDTH container ── */
.wrap{width:100%;padding:20px 24px}
.view{display:none}.view.on{display:block}

/* ── Flashcard Grid: 4-6 per row ── */
#leadL{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
@media(min-width:1200px){#leadL{grid-template-columns:repeat(6,1fr)}}
@media(min-width:900px) and (max-width:1199px){#leadL{grid-template-columns:repeat(4,1fr)}}
@media(max-width:600px){#leadL{grid-template-columns:repeat(2,1fr)}}

/* ── Lead Flashcard ── */
.lead{background:var(--card);border:1px solid var(--bd2);border-radius:14px;overflow:hidden;transition:.25s;cursor:pointer;display:flex;flex-direction:column;position:relative;box-shadow:0 0 8px rgba(212,160,23,.06),0 2px 8px rgba(0,0,0,.3)}
.lead:hover{border-color:var(--ac);box-shadow:0 0 20px rgba(212,160,23,.25),0 8px 28px rgba(0,0,0,.5);transform:translateY(-4px)}
.lead:active{transform:translateY(-1px);box-shadow:0 0 28px rgba(212,160,23,.4),0 4px 16px rgba(0,0,0,.5);border-color:var(--ac2)}
.lead.dn{opacity:.35}.lead.dn:hover{opacity:.5}
.lead.dn.fu-green,.lead.dn.fu-yellow,.lead.dn.fu-red{opacity:1}
.lead.priority{border-color:var(--ac);box-shadow:0 0 12px rgba(212,160,23,.2)}

.lh{padding:18px 16px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:180px;flex:1;gap:4px}
.lc{font-weight:800;font-size:17px;color:#fff;letter-spacing:-.3px;line-height:1.2;word-break:break-word}
.lh-sub{font-size:10px;color:var(--mt);font-weight:500;margin-top:2px}
.lh-sub strong{color:var(--t2);font-weight:600}

/* Task score */
.lh-score{font-size:16px;font-weight:900;margin-top:8px;letter-spacing:1px}
.sc-done{color:var(--gn)}.sc-part{color:var(--am)}.sc-none{color:var(--dm)}

/* Status pill */
.ls{font-size:7px;font-weight:700;padding:3px 10px;border-radius:6px;text-transform:uppercase;letter-spacing:.5px;margin-top:6px}
.s0{background:#1a1a2a;color:var(--dm)}.s1{background:#1f1800;color:var(--am)}.s2{background:#1a1a3e;color:var(--pp)}.s3{background:#052e16;color:var(--gn2)}.s4{background:#1f1800;color:var(--ac)}.s5{background:#022c22;color:var(--teal)}.s6{background:#1c0a0a;color:#f87171}

/* Playbook CTA */
.lh-pb{background:var(--ac);color:#0a0a0f;border:none;padding:8px 22px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;margin-top:10px;transition:.15s;letter-spacing:.3px}
.lh-pb:hover{background:var(--ac2);transform:scale(1.05)}
/* Follow-up timing — full card tint */
.lead.fu-green{background:#080f08;border-color:var(--gn);box-shadow:0 0 8px rgba(34,197,94,.15)}
.lead.fu-yellow{background:#12100a;border-color:var(--am);box-shadow:0 0 10px rgba(245,158,11,.2)}
.lead.fu-red{background:#120808;border-color:var(--rd);box-shadow:0 0 12px rgba(239,68,68,.25)}
.fu-tag{font-size:8px;font-weight:700;padding:3px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.3px;margin-top:4px;display:inline-block}
.fu-tag.green{background:#052e16;color:var(--gn2)}
.fu-tag.yellow{background:#1f1800;color:var(--am)}
.fu-tag.red{background:#1c0a0a;color:#f87171;animation:fupulse 1.2s infinite}
@keyframes fupulse{0%,100%{opacity:1}50%{opacity:.5}}
/* Playbook follow-up box */
/* fu-box removed — replaced by .next-action consolidated section */
/* Urgency corner badge (Anteriores only) */
.fu-urgency{position:absolute;top:8px;right:8px;font-size:8px;font-weight:900;padding:3px 8px;border-radius:4px;letter-spacing:1px;z-index:2}
.fu-urgency.red{background:var(--rd);color:#fff;animation:fupulse 1s infinite}
.fu-urgency.yellow{background:var(--am);color:#0a0a0f}
/* Hoy awareness indicator — subtle nudge to check Acción Ahora */
.hoy-pending{display:inline-flex;align-items:center;gap:8px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:var(--am);padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;margin-bottom:14px;cursor:pointer;transition:.2s}
.hoy-pending:hover{background:rgba(245,158,11,.18);transform:translateY(-1px)}
.hoy-pending strong{color:#fbbf24}

/* ═══ ACCIÓN AHORA — focused execution queue ═══ */
.aa-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;max-width:980px;margin:24px auto 0}
@media(max-width:600px){.aa-grid{grid-template-columns:1fr;gap:14px;margin:12px auto 0}}
.aa-card{background:var(--card);border:2px solid var(--bd2);border-radius:14px;padding:24px 22px 20px;cursor:pointer;display:flex;flex-direction:column;gap:6px;min-height:200px;position:relative;transition:.2s;box-shadow:0 4px 14px rgba(0,0,0,.25)}
.aa-card:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.5)}
.aa-card.fu-red{border-color:var(--rd);background:#120808;box-shadow:0 0 18px rgba(239,68,68,.18)}
.aa-card.fu-yellow{border-color:var(--am);background:#12100a;box-shadow:0 0 14px rgba(245,158,11,.15)}
.aa-urgency{position:absolute;top:14px;right:14px;font-size:9px;font-weight:900;padding:4px 10px;border-radius:5px;letter-spacing:1.5px}
.aa-urgency.red{background:var(--rd);color:#fff;animation:fupulse 1s infinite}
.aa-urgency.yellow{background:var(--am);color:#0a0a0f}
.aa-urgency.green{background:rgba(0,200,80,0.15);color:var(--gr);border:1px solid rgba(0,200,80,0.35)}
.aa-company{font-size:22px;font-weight:800;color:#fff;margin-top:24px;letter-spacing:-.3px;line-height:1.2}
.aa-action{font-size:13px;color:var(--t2);font-weight:600;margin-top:4px}
.aa-time{font-size:15px;font-weight:800;letter-spacing:.3px;margin-top:2px}
.aa-time.red{color:#f87171}.aa-time.yellow{color:var(--am)}
.aa-cta{margin-top:14px;background:var(--ac);color:#0a0a0f;border:none;padding:11px 22px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;align-self:flex-start;letter-spacing:.3px}
.aa-cta:hover{background:var(--ac2);transform:scale(1.03)}
.aa-empty{text-align:center;padding:80px 20px;color:var(--dm);font-size:16px;font-weight:600;letter-spacing:.3px}
.aa-empty .aa-empty-icon{font-size:42px;margin-bottom:14px;opacity:.5}
/* Hoy "completed" state — NOT an empty-state. Compact, top-aligned, forward-pointing. */
.hoy-done{grid-column:1/-1;display:flex;align-items:center;gap:14px;padding:14px 18px;margin:10px 0 6px;background:linear-gradient(90deg,rgba(0,200,80,0.06),rgba(212,160,23,0.04));border:1px solid rgba(0,200,80,0.25);border-radius:10px}
.hoy-done-icon{flex-shrink:0;width:32px;height:32px;border-radius:50%;background:rgba(0,200,80,0.12);color:var(--gr);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800}
.hoy-done-body{flex:1;min-width:0}
.hoy-done-title{font-size:13px;font-weight:700;color:var(--t);letter-spacing:-0.1px}
.hoy-done-sub{font-size:11px;color:var(--mt);margin-top:2px}
.hoy-done-sub strong{color:var(--t2);font-weight:600}
.hoy-done-cta{flex-shrink:0;background:var(--ac);color:#0a0a0f;border:none;padding:9px 16px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:0.3px;transition:transform .1s}
.hoy-done-cta:hover{transform:translateX(2px)}
.hoy-done-cta::after{content:'  →';font-weight:800}
@media(max-width:700px){
  .hoy-done{flex-wrap:wrap;gap:10px 12px}
  .hoy-done-body{flex:1 1 calc(100% - 50px);min-width:0}
  .hoy-done-title{white-space:normal}
  .hoy-done-cta{width:100%;margin-top:2px;padding:10px}
  .hoy-done-cta::after{content:' →'}
}
.aa-queue-info{text-align:center;color:var(--dm);font-size:11px;margin-top:24px;letter-spacing:.5px;text-transform:uppercase}
/* NEXT ACTION block — single source of truth in playbook */
.next-action{background:linear-gradient(135deg,rgba(212,160,23,.04),rgba(255,255,255,.01));border:1px solid var(--bd2);border-radius:10px;padding:14px;margin-top:10px}
.na-title{font-size:14px;font-weight:700;color:var(--tx);margin:4px 0 10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.na-time{font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:.5px;text-transform:uppercase}
.na-time.green{background:rgba(34,197,94,.15);color:var(--gn2)}
.na-time.yellow{background:rgba(245,158,11,.15);color:var(--am)}
.na-time.red{background:rgba(239,68,68,.18);color:#f87171;animation:fupulse 1s infinite}
.na-playbook{margin-top:12px;background:var(--sf);border:1px solid var(--bd);border-radius:6px;padding:10px 14px}
.na-pb-label{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--dm);margin-bottom:6px}
.na-playbook ol{padding-left:20px;margin:0}
.na-playbook li{font-size:12px;color:var(--t2);line-height:1.7}
.na-save{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.na-save .sa{margin:0}
/* Past leads — compact cards */
.lead.compact{min-height:auto;padding:12px 14px;border-radius:10px}
.lead.compact .lc{font-size:13px;line-height:1.2}
.lead.compact .lh-sub{font-size:9px}
.lead.compact .fu-tag{font-size:7px;margin-top:3px}
/* Date separator */
.past-sep{text-align:center;margin:18px 0 8px;position:relative;grid-column:1/-1}
.past-sep::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:var(--bd2)}
.past-sep span{background:var(--bg);padding:0 14px;font-size:10px;font-weight:700;color:var(--dm);text-transform:uppercase;letter-spacing:1px;position:relative}

/* Priority label */
.pri-tag{position:absolute;top:8px;right:8px;font-size:7px;font-weight:700;color:var(--ac);text-transform:uppercase;letter-spacing:.5px;background:rgba(212,160,23,.12);padding:2px 6px;border-radius:4px}
/* Score badge — centered above company name, not overlapping */
.lh-scorebadge{font-size:11px;font-weight:900;color:var(--ac);background:rgba(212,160,23,.1);padding:3px 10px;border-radius:6px;border:1px solid rgba(212,160,23,.25);margin-bottom:6px;display:inline-block}

/* ── Playbook Overlay (Focus Mode) ── */
.pb-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(4,4,8,.92);z-index:300;overflow-y:auto;-webkit-overflow-scrolling:touch;backdrop-filter:blur(4px)}
.pb-overlay.open{display:flex;align-items:flex-start;justify-content:center;padding:24px}
.pb-box{width:100%;max-width:620px;background:var(--card);border-radius:16px;border:1px solid var(--bd);box-shadow:0 12px 48px rgba(0,0,0,.6);overflow:hidden}
.pb-head{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;background:var(--sf)}
.pb-close{background:var(--bd);border:none;color:var(--tx);width:30px;height:30px;border-radius:8px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pb-close:hover{background:var(--bd2)}
.pb-title{font-size:16px;font-weight:800;color:#fff;flex:1}
.pb-sc{font-size:14px;font-weight:900}
.pb-body{padding:18px 20px}

.sec{margin-bottom:12px}
.sl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--dm);margin-bottom:4px}
.chs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.ch{font-size:10px;padding:3px 10px;border-radius:10px;font-weight:600}
.ce{background:#0a1f12;color:var(--gn2);border:1px solid #166534}
.ci{background:#150a28;color:#d8b4fe;border:1px solid #6d28d9}
.cw{background:#0a1f12;color:var(--teal);border:1px solid #0d9488}
.cl{background:#0a142e;color:#93c5fd;border:1px solid #1d4ed8}
.cph{background:var(--bd);color:var(--mt)}
.tags{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px}
.tag{font-size:8px;padding:2px 7px;border-radius:5px;background:var(--bd);color:var(--mt);font-weight:500}
.insight{background:linear-gradient(135deg,#12110a,#161410);border-left:3px solid var(--ac);padding:8px 12px;font-size:11px;color:var(--ac2);border-radius:0 6px 6px 0;margin-bottom:10px}
.ctx{font-size:11px;color:var(--t2);line-height:1.5}
.dm-card{padding:8px 10px;background:var(--pn);border:1px solid var(--bd);border-radius:6px;margin-top:6px}
.dm-card:first-child{margin-top:0}
.dm-flag{font-size:10px;color:var(--am);margin-top:4px;font-weight:500}
.str-row{display:flex;gap:8px;align-items:flex-start;font-size:11px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.str-row:last-child{border-bottom:none}
.str-k{color:var(--mt);min-width:54px;font-weight:600;text-transform:uppercase;font-size:9px;letter-spacing:0.5px;padding-top:2px}
.str-v{color:var(--t2);line-height:1.4;flex:1}
.str-badge{display:inline-block;padding:1px 7px;border-radius:10px;font-weight:700;font-size:10px;margin-right:4px}
.str-msg{position:relative;background:rgba(0,0,0,0.2);border:1px solid var(--bd);border-radius:4px;padding:6px 32px 6px 8px;flex:1;font-size:11px}
.str-msg pre{margin:0;white-space:pre-wrap;font-family:inherit;color:var(--t2)}

/* ═══ STEP-BASED EXECUTION HIERARCHY ═══
 * PASO 1 (step-primary) is the dominant block — send email now.
 * REFUERZO (step-refuerzo) is a small secondary block — LinkedIn same-day.
 * PASO 2 (step-secondary) is the 48h follow-up preview — small, muted. */
.step{border-radius:10px;padding:14px 16px;margin-bottom:12px;background:var(--pn);border:1px solid var(--bd)}
.step-primary{background:linear-gradient(180deg,rgba(212,160,23,0.08),rgba(212,160,23,0.02));border:1.5px solid var(--ac);box-shadow:0 0 0 1px rgba(212,160,23,0.15)}
.step-refuerzo{background:rgba(255,255,255,0.015);border:1px dashed rgba(255,255,255,0.12);opacity:0.92;padding:10px 12px}
.step-secondary{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.08);padding:10px 12px}
.step-head{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.step-head-minor{margin-bottom:4px}
.step-num{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--ac);background:rgba(212,160,23,0.12);padding:3px 8px;border-radius:4px}
.step-primary .step-num{background:var(--ac);color:#0a0a0f}
.step-secondary .step-num{background:rgba(255,255,255,0.08);color:var(--mt)}
.step-title{font-size:17px;font-weight:800;color:var(--t);letter-spacing:-0.2px;flex:1}
.step-secondary .step-title{font-size:13px;font-weight:700;color:var(--t2)}
.step-time{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:4px;background:rgba(255,255,255,0.06);color:var(--mt)}
.step-time-red{background:var(--rd);color:#fff}
.step-time-yellow{background:var(--am);color:#0a0a0f}
.step-time-green{background:rgba(0,200,80,0.15);color:var(--gr)}
.step-tag-minor{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mt)}
.step-tag-opt{font-size:9px;font-style:italic;color:var(--mt);opacity:0.7;margin-left:6px}
.step-to{font-size:12px;color:var(--t2);margin-bottom:10px;padding:6px 10px;background:rgba(0,0,0,0.2);border-radius:6px}
.step-to strong{color:var(--t);font-weight:600}
.step-to .step-who{color:var(--mt);font-weight:400}
.step-to-minor{font-size:11px;color:var(--mt);margin-bottom:6px}
.step-to-minor strong{color:var(--t2);font-weight:600}
.step-ext{color:var(--ac);text-decoration:none;font-size:10px;margin-left:6px}
.step-ext:hover{text-decoration:underline}
.step-primary .msg{max-height:300px;overflow-y:auto}
.step-refuerzo .msg{max-height:140px;overflow-y:auto;font-size:11px}
.msg-small pre{font-size:11px}
.step-body-text{font-size:12px;color:var(--t2);line-height:1.5;padding:2px 0}
/* Quick-check button */
.step-check{display:flex;align-items:center;gap:9px;margin-top:12px;padding:10px 14px;background:rgba(0,0,0,0.25);border:1.5px solid var(--bd);border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:var(--t2);transition:all 0.15s;user-select:none}
.step-check:hover{background:rgba(0,0,0,0.35);border-color:var(--ac)}
.step-check input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:var(--ac)}
.step-check.is-done{background:rgba(0,200,80,0.08);border-color:var(--gr);color:var(--gr)}
/* Completed step — softer, lower-contrast so attention moves to the next action */
.step-primary.step-done{border-color:rgba(0,200,80,0.45);box-shadow:0 0 0 1px rgba(0,200,80,0.12);background:linear-gradient(180deg,rgba(0,200,80,0.04),rgba(0,200,80,0.01))}

.step-adv .sa{margin-top:6px}

.acc[open] summary::before{content:'▾ '}

<script>
const USER='scarlett';const DBK='unabase_'+CLIENT_ID+'_'+USER;let TL=[];
const ST=['none','partial','contacted','replied','meeting','closed','skip'];
const SL=['Sin contactar','Parcial','Contactado','Respondió','Reunión','Cerrado','Omitir'];

// ═══ DUAL PERSISTENCE: localStorage (instant) + Supabase (shared) ═══
// localStorage = instant UI, survives offline
// Supabase = shared across devices, survives deploys
function db(){try{return JSON.parse(localStorage.getItem(DBK))||{}}catch{return{}}}
function sdb(d){localStorage.setItem(DBK,JSON.stringify(d))}
function gr(id){const D=db();return D[id]||{id,co:'',cn:'',st:'none',acts:[],msgs:[],tl:[],notes:'',lead:null,up:null}}

function ur(id,u){
  // Write to localStorage (instant)
  const D=db();const r={...gr(id),...u,up:new Date().toISOString()};D[id]=r;sdb(D);
  // Write to Supabase (async, shared)
  sbSync(id,r);
  return r;
}

function allR(){return Object.values(db()).filter(r=>r.co)}

function merge(leads){
  const D=db();
  leads.forEach(l=>{
    const id=dom(l.website);if(!id)return;
    if(!D[id]){
      D[id]={id,co:l.companyName,cn:l.contactName||'',st:'none',acts:[],msgs:[],tl:[],notes:'',lead:l,up:new Date().toISOString()};
      // Upsert lead to Supabase
      sbUpsertLead(id,l,false);
    } else {
      D[id].lead=l;D[id].co=l.companyName;if(l.contactName)D[id].cn=l.contactName;
    }
  });
  sdb(D);
}

// ═══ SUPABASE WRITE FUNCTIONS (fire-and-forget, non-blocking) ═══
async function sbUpsertLead(id,l,isHist){
  // IMPORTANT: do NOT include `status` in this upsert payload.
  // sbUpsertLead is fire-and-forget and runs (often late) from merge() after
  // page load. If `status:'none'` is in the payload, Postgres `ON CONFLICT (id)
  // DO UPDATE SET status='none', …` will STOMP any terminal state the user
  // just set (replied/meeting/closed/skip) via sS(). That's how your 2nd
  // RESPONDIÓ got silently reverted.
  //
  // The `leads.status` column defaults to 'none' at the DB level, so new rows
  // still get the right initial value without us sending it here. Status
  // updates flow through sbSync() and sbLogStatus() only.
  try{await sb.from('leads').upsert({
    id,company:l.companyName||'',contact_name:l.contactName||null,contact_email:l.contactEmail||null,
    contact_phone:l.contactPhone||null,country:l.country||null,industry:l.industry||null,
    score:l.unabaseScore||0,source_date:new Date().toISOString().slice(0,10),
    is_historical:!!isHist,lead_data:l,updated_at:new Date().toISOString(),
    client_id:CLIENT_ID
  },{onConflict:'id'})}catch(e){console.warn('sb upsert lead:',e.message)}
}

async function sbSync(id,rec){
  try{
    await sb.from('leads').update({status:rec.st,updated_at:new Date().toISOString()}).eq('id',id).eq('client_id',CLIENT_ID);
  }catch(e){console.warn('sb sync:',e.message)}
}

async function sbLogAction(leadId,channel,completed){
  try{
    const r=completed
      ?await sb.from('actions').insert({lead_id:leadId,user_name:USER,channel,completed:true,client_id:CLIENT_ID})
      :await sb.from('actions').delete().match({lead_id:leadId,channel,user_name:USER,client_id:CLIENT_ID});
    if(r&&r.error){console.error('[sb] action FAILED:',r.error.message);return false}
    return true;
  }catch(e){console.error('[sb] action EXCEPTION:',e.message);return false}
}

async function sbLogMessage(leadId,channel,text){
  try{
    const r=await sb.from('messages_sent').insert({lead_id:leadId,user_name:USER,channel,message_text:text,client_id:CLIENT_ID});
    if(r&&r.error){console.error('[sb] msg FAILED:',r.error.message);return false}
    return true;
  }catch(e){console.error('[sb] msg EXCEPTION:',e.message);return false}
}

async function sbDeleteMessage(leadId,sentAt){
  try{
    const r=await sb.from('messages_sent').delete().match({lead_id:leadId,user_name:USER,sent_at:sentAt,client_id:CLIENT_ID});
    if(r&&r.error){console.error('[sb] del msg FAILED:',r.error.message);return false}
    return true;
  }catch(e){console.error('[sb] del msg EXCEPTION:',e.message);return false}
}

async function delMsg(domId,ts){
  if(!confirm('Borrar este mensaje enviado?'))return;
  console.log('[delMsg] click',{domId,ts});
  const D=db();const rec=D[domId];
  if(!rec||!rec.msgs)return;
  const deleted=rec.msgs.find(m=>m.ts===ts);
  const delCh=deleted?deleted.ch:null;
  rec.msgs=rec.msgs.filter(m=>m.ts!==ts);
  const msgOk=await sbDeleteMessage(domId,ts);
  let actOk=true;
  if(delCh){
    const stillHasChMsg=rec.msgs.some(m=>m.ch===delCh);
    if(!stillHasChMsg&&(rec.acts||[]).includes(delCh)){
      rec.acts=rec.acts.filter(a=>a!==delCh);
      actOk=await sbLogAction(domId,delCh,false);
    }
  }
  rec.st=cSt(rec);
  D[domId]=rec;sdb(D);
  console.log('[delMsg] write',{domId,delCh,msgOk,actOk});
  openPB(domId);
  refresh(); // Update Hoy indicator + Acción Ahora queue
  toast((msgOk&&actOk)?'Mensaje borrado':'⚠️ Borrado local, falló sync — revisa consola');
}

async function sbSaveNote(leadId,text){
  try{
    const r=await sb.from('notes').upsert({lead_id:leadId,user_name:USER,note_text:text,updated_at:new Date().toISOString(),client_id:CLIENT_ID},{onConflict:'lead_id,user_name'});
    if(r&&r.error){console.error('[sb] note FAILED:',r.error.message);return false}
    return true;
  }catch(e){console.error('[sb] note EXCEPTION:',e.message);return false}
}

async function sbLogStatus(leadId,status){
  try{
    const r=await sb.from('status_history').insert({lead_id:leadId,user_name:USER,status,client_id:CLIENT_ID});
    if(r&&r.error){console.error('[sb] status FAILED:',r.error.message);return false}
    // Also update the leads table status column for consistency
    await sb.from('leads').update({status,updated_at:new Date().toISOString()}).eq('id',leadId).eq('client_id',CLIENT_ID);
    return true;
  }catch(e){console.error('[sb] status EXCEPTION:',e.message);return false}
}

// ═══ SUPABASE LOAD (on startup, hydrate from shared DB — filtered by client_id) ═══
async function sbLoadAll(){
  try{
    const{data:leads}=await sb.from('leads').select('*').eq('client_id',CLIENT_ID);
    if(!leads||!leads.length)return;
    const D=db();
    leads.forEach(l=>{
      if(!D[l.id]){D[l.id]={id:l.id,co:l.company,cn:l.contact_name||'',st:l.status||'none',acts:[],msgs:[],tl:[],notes:'',lead:l.lead_data,up:l.updated_at}}
      else{
        // Supabase status usually wins (cross-device sync). BUT never downgrade
        // a terminal state (replied/meeting/closed/skip) already set locally —
        // those are explicit user actions and must not be silently reverted by
        // a stale Supabase row (e.g. from a pre-fix race that left status='none').
        if(SEQ_STOPS.includes(D[l.id].st)&&!SEQ_STOPS.includes(l.status)){
          console.warn('[sb] refusing to downgrade terminal local state',D[l.id].st,'for',l.id,'(Supabase had:',l.status,')');
        } else {
          D[l.id].st=l.status||D[l.id].st;
        }
      }
    });
    // Load actions — filtered by client_id. Capture earliest completed_at
    // per (lead, channel) so we can backfill auto-anchor messages below for
    // any action that was logged without a corresponding message.
    const{data:acts}=await sb.from('actions').select('*').eq('completed',true).eq('client_id',CLIENT_ID);
    Object.values(D).forEach(r=>{if(r.acts)r.acts=[]});
    const actionTs={}; // { leadId: { channel: earliest_completed_at } }
    if(acts)acts.forEach(a=>{
      if(!D[a.lead_id])return;
      if(!D[a.lead_id].acts.includes(a.channel))D[a.lead_id].acts.push(a.channel);
      if(!actionTs[a.lead_id])actionTs[a.lead_id]={};
      const prev=actionTs[a.lead_id][a.channel];
      if(!prev||(a.completed_at&&new Date(a.completed_at)<new Date(prev)))actionTs[a.lead_id][a.channel]=a.completed_at;
    });
    // Load messages — filtered by client_id
    const{data:msgs}=await sb.from('messages_sent').select('*').eq('client_id',CLIENT_ID);
    if(msgs)msgs.forEach(m=>{if(D[m.lead_id]){const existing=D[m.lead_id].msgs||[];if(!existing.find(x=>x.ts===m.sent_at))existing.push({ch:m.channel,tx:m.message_text,ts:m.sent_at});D[m.lead_id].msgs=existing}});
    // Load notes — filtered by client_id
    const{data:nts}=await sb.from('notes').select('*').eq('client_id',CLIENT_ID);
    if(nts)nts.forEach(n=>{if(D[n.lead_id])D[n.lead_id].notes=n.note_text||''});
    // SELF-HEAL (forward): if a lead has a message for channel X but no
    // matching action row, add the action. Protects against sM()/tA() drift.
    const healed=[];
    Object.entries(D).forEach(([id,r])=>{
      (r.msgs||[]).forEach(m=>{
        if(!r.acts)r.acts=[];
        if(!r.acts.includes(m.ch)){
          r.acts.push(m.ch);
          healed.push({id,ch:m.ch});
          sb.from('actions').insert({lead_id:id,user_name:USER,channel:m.ch,completed:true,completed_at:m.ts,client_id:CLIENT_ID}).then(()=>{}).catch(()=>{});
        }
      });
    });
    if(healed.length)console.warn('[self-heal] repaired '+healed.length+' missing action(s):',healed);
    // SELF-HEAL (reverse): if a lead has an action for channel X but NO
    // message with that channel, insert an auto-anchor message. The cycle
    // engine (getFollowUp) reads rec.msgs[].ts to compute +48h / +168h —
    // without this, checkbox-only contacted leads stay stuck at RED
    // "Guardar mensaje enviado".
    //
    // TIMESTAMP INTEGRITY RULES — the anchor MUST reflect the real moment
    // the operator marked the channel as sent, never a load-time fabrication.
    // Sources, in order of reliability:
    //   1. Supabase actions.completed_at (set by DEFAULT NOW() on insert —
    //      this is the authoritative real-time stamp of the original click)
    //   2. Local rec.tl 'act' entry matching this channel (same ts as written
    //      by tA() at click time — backup when Supabase sync was skipped)
    //   3. If BOTH are missing → flag rec._anchorUncertain=true and SKIP
    //      the insert. Never fall back to `new Date()` (= load time) or to
    //      `r.up` (= last record write) because both would silently offset
    //      the +48h / +168h cycle math from reality.
    //
    // Fires once per (lead,channel) — `msgs.some(m=>m.ch===ch)` is idempotent.
    const anchored=[];
    const uncertain=[];
    Object.entries(D).forEach(([id,r])=>{
      if(!r.acts)return;
      if(!r.msgs)r.msgs=[];
      r.acts.forEach(ch=>{
        if(r.msgs.some(m=>m.ch===ch))return;
        // Source 1: Supabase actions.completed_at
        let ts=(actionTs[id]&&actionTs[id][ch])||null;
        let source=ts?'supabase_completed_at':null;
        // Source 2: local rec.tl timeline (earliest 'Completó: <ch>' entry)
        if(!ts&&Array.isArray(r.tl)){
          const tlMatch=r.tl
            .filter(e=>e&&e.tp==='act'&&typeof e.desc==='string'&&e.desc.startsWith('Completó: ')&&e.desc.endsWith(' '+ch))
            .sort((a,b)=>new Date(a.ts)-new Date(b.ts))[0];
          if(tlMatch&&tlMatch.ts){ts=tlMatch.ts;source='local_tl';}
        }
        if(!ts){
          // No reliable timestamp — flag and skip. Do NOT invent.
          r._anchorUncertain=true;
          r._anchorUncertainChannels=r._anchorUncertainChannels||[];
          if(!r._anchorUncertainChannels.includes(ch))r._anchorUncertainChannels.push(ch);
          uncertain.push({id,ch});
          return;
        }
        r.msgs.push({ch,tx:AUTO_ANCHOR_TX,ts});
        anchored.push({id,ch,ts,source});
        sb.from('messages_sent').insert({lead_id:id,user_name:USER,channel:ch,message_text:AUTO_ANCHOR_TX,sent_at:ts,client_id:CLIENT_ID}).then(()=>{}).catch(()=>{});
      });
      // Clean flag if every channel now has a reliable anchor (idempotent reload)
      if(r._anchorUncertain&&r.acts.every(ch=>r.msgs.some(m=>m.ch===ch))){
        delete r._anchorUncertain;
        delete r._anchorUncertainChannels;
      }
    });
    if(anchored.length)console.warn('[self-heal] anchored '+anchored.length+' checkbox-only action(s):',anchored);
    if(uncertain.length)console.error('[self-heal] ⚠️ '+uncertain.length+' action(s) have NO reliable timestamp source — flagged _anchorUncertain, NOT inserting synthetic anchors:',uncertain);
    // Recalculate status from actions for leads without manual override
    Object.values(D).forEach(r=>{
      if(!['replied','meeting','closed','skip'].includes(r.st)){
        r.st=cSt(r);
      }
    });
    sdb(D);
    console.log('Loaded '+leads.length+' leads from Supabase');
  }catch(e){console.warn('sb load:',e.message)}
}
function dom(u){try{return new URL(u).hostname.replace(/^www\./,'')}catch{return''}}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function now(){return new Date().toISOString()}
function ago(t){if(!t)return'';const d=Date.now()-new Date(t).getTime();if(d<60000)return'ahora';if(d<3600000)return Math.floor(d/60000)+'m';if(d<86400000)return Math.floor(d/3600000)+'h';return Math.floor(d/86400000)+'d'}
function cSt(rec){
  if(['replied','meeting','closed','skip'].includes(rec.st))return rec.st;
  const a=rec.acts||[];
  if(!a.length)return'none';
  const l=rec.lead;
  // No lead data OR new runtime-template leads (no pre-generated playbook fields) → any action = contacted
  if(!l)return'contacted';
  const av=[];
  if(l.emailCercana)av.push('email');
  if(l.whatsappMessage&&(l.contactPhone||l.apolloCompanyPhone))av.push('wa');
  if(l.instagramDM&&(l.instagramHandle||l.instagramUrl))av.push('ig');
  if(l.linkedinPlaybook&&(l.contactLinkedIn||l.apolloCompanyLinkedIn))av.push('li');
  // If no pre-generated playbook (new runtime-template system), any action = contacted
  if(!av.length)return'contacted';
  return av.every(x=>a.includes(x))?'contacted':'partial';
}
function getSteps(l){const s=[];const first=l.contactName?l.contactName.split(/\s+/)[0]:'Equipo';const ig=l.instagramHandle||(l.instagramUrl?(l.instagramUrl.match(/instagram\.com\/([^/]+)/)||[])[1]:null);if(l.emailCercana)s.push({id:'email',label:'Email a '+first,msg:l.emailCercana,ch:'email'});if(l.whatsappMessage&&(l.contactPhone||l.apolloCompanyPhone))s.push({id:'wa',label:'WhatsApp',msg:l.whatsappMessage,ch:'wa'});if(l.instagramDM&&ig)s.push({id:'ig',label:'DM @'+ig,msg:l.instagramDM,ch:'ig'});if(l.linkedinPlaybook&&(l.contactLinkedIn||l.apolloCompanyLinkedIn))s.push({id:'li',label:'LinkedIn',msg:l.linkedinPlaybook.connectionNote||'',ch:'li'});return s}

// ═══ FOLLOW-UP ENGINE — STRICT TIME-BASED STATE MACHINE ═══
// Color (time vs due_at):
//   GREEN:  diff > 24h    (not due soon)
//   YELLOW: 0 < diff <= 24h   (due soon)
//   RED:    diff <= 0    (DUE NOW or OVERDUE — immediate)
//
// Cycles (main = email channel):
//   Cycle 1: IG at anchor+48h, then main at anchor+168h
//   Cycle 2: WhatsApp at main2+48h, then main at main2+168h
//   Cycle 3-4: only main every 168h, NO alt
//   After cycle 4: monthly (720h = 30 days), NO alt
//
// Stops (no active follow-up): replied / meeting / closed / skip
const SEQ_STOPS=['replied','meeting','closed','skip'];
// AUTO-ANCHOR MARKER — text used when the user marks a channel as sent via
// the checkbox without pasting the real body. This placeholder message is
// what the follow-up engine uses as the cycle anchor timestamp. Stable text
// so multi-device sync can identify + clean up on uncheck, AND so sbLoadAll's
// reverse self-heal can skip duplicate inserts.
const AUTO_ANCHOR_TX='[Marcado como enviado]';
const CYCLE_LEN=7*24*3600000;   // 168h main follow-up
const ALT_DELAY=2*24*3600000;   // 48h alt channel
const MONTHLY_LEN=30*24*3600000; // 30 days after cycle 4

// ═══ TIME WINDOW CONTROL ═══
// Outbound actions only suggested between 10:00 AM - 6:00 PM in lead's local timezone.
// Outside window → show "programado para hoy/mañana 10:00 AM" instead of "ahora".
// Does NOT block the action, only adjusts display recommendation.
const COUNTRY_TZ={'Argentina':'America/Argentina/Buenos_Aires','Mexico':'America/Mexico_City','Colombia':'America/Bogota','Chile':'America/Santiago','Peru':'America/Lima','Spain':'Europe/Madrid','Ecuador':'America/Guayaquil','Costa Rica':'America/Costa_Rica','Uruguay':'America/Montevideo','Paraguay':'America/Asuncion','Bolivia':'America/La_Paz','Venezuela':'America/Caracas','Panama':'America/Panama','Guatemala':'America/Guatemala','Honduras':'America/Tegucigalpa','El Salvador':'America/El_Salvador','Nicaragua':'America/Managua','Dominican Republic':'America/Santo_Domingo','Cuba':'America/Havana','Puerto Rico':'America/Puerto_Rico','LATAM':'America/Mexico_City'};
function windowStatus(country){
  const tz=COUNTRY_TZ[country]||'America/New_York';
  const hourStr=new Date().toLocaleString('en-US',{timeZone:tz,hour:'numeric',hour12:false});
  const hour=parseInt(hourStr,10);
  if(hour>=10&&hour<18)return{inWindow:true,hour};
  if(hour<10)return{inWindow:false,hour,label:'programado para hoy 10:00 AM'};
  return{inWindow:false,hour,label:'programado para mañana 10:00 AM'};
}
// Execution-clarity label. Tells the user WHEN TO ACT, never history.
// - RED state → 'ahora' (if in window) or 'programado para hoy/mañana 10:00 AM'
//   The "hace 1d" history info is removed — that belongs in message log, not action.
// - GREEN/YELLOW → keep countdown ('en 12h', 'en 36h') — countdown IS execution timing.
function adjustTimeStr(fu,country){
  if(!fu||!fu.color)return fu?fu.timeStr:'';
  if(fu.color==='red'){
    const w=windowStatus(country);
    return w.inWindow?'ahora':w.label;
  }
  return fu.timeStr;
}

function getFollowUp(rec,lead,context){
  const st=rec.st||'none';
  if(SEQ_STOPS.includes(st))return{active:false,reason:st,color:'none'};
  const acts=rec.acts||[];const msgs=rec.msgs||[];
  // No messages yet → first action is ALWAYS email, ready now. Never return inactive for open leads.
  if(!acts.length&&!msgs.length){
    return{active:true,step:{label:'Email inicial',channel:'email'},state:'waiting',timeStr:'ahora',color:'green',cycle:0,dueMs:Date.now()};
  }

  const allTs=msgs.map(m=>new Date(m.ts).getTime()).filter(t=>!isNaN(t)).sort((a,b)=>a-b);
  if(!allTs.length){
    // Has acts checked but no messages saved — treat as active, unknown timing
    return{active:true,step:{label:'Guardar mensaje enviado',channel:'email'},state:'due',timeStr:'ahora',color:'red',cycle:0};
  }

  const nowMs=Date.now();

  // ═══ TIMESTAMP INTEGRITY — locked rules ═══
  // last_main_sent_at must reflect real outreach moment, NEVER import/created_at.
  // Rules:
  //   1. Past leads (_batchDate set): always use min(actual, batch@noonET).
  //      Preserves timeline for archived batches regardless of when data was logged.
  //   2. Normal leads (actual msg within 48h of source_date): use actual.
  //      Trust the saved timestamp — this is real same-day/next-day outreach.
  //   3. SAFEGUARD: any lead where msg_ts is >48h after source_date → snap to
  //      source_date@noonET. Catches late-logged imports/backfills that would
  //      otherwise fake a "fresh" cycle from an old lead.
  let anchorTs=allTs[0];
  const batchSrc=lead?._batchDate||lead?.source_date;
  if(batchSrc){
    const bdTs=new Date(batchSrc+'T16:00:00Z').getTime(); // noon ET (16:00 UTC in DST)
    if(!isNaN(bdTs)){
      if(lead._batchDate){
        // Rule 1: Anteriores leads always use batch floor
        anchorTs=Math.min(allTs[0],bdTs);
      }else if(allTs[0]-bdTs>14*24*3600000){
        // Rule 3 SAFEGUARD: msg logged >14 days after source_date → looks like
        // a stale import/backfill (someone pasting in very old leads). Normal
        // workflow is a batch being worked over days, not weeks — so we give
        // the user a reasonable 14-day window where real send timestamps are
        // trusted as-is. Previous 48h threshold was breaking normal 2–4 day
        // batches (user sends email Day 3 → engine thought it was backfill).
        anchorTs=bdTs;
        console.warn('[timestamp-safeguard]',lead.companyName||'?','msg is '+Math.round((allTs[0]-bdTs)/(24*3600000))+'d after source_date. Using source_date as anchor.');
      }
      // else Rule 2: normal case, keep actual
    }
  }

  // Separate messages by channel (email = main, everything else = alt)
  const mainMsgs=msgs.filter(m=>m.ch==='email').sort((a,b)=>new Date(a.ts)-new Date(b.ts));
  const cycleNum=mainMsgs.length; // 1 after first main, 2 after second, etc.
  const lastMainTs=cycleNum?new Date(mainMsgs[cycleNum-1].ts).getTime():anchorTs;

  let nextStep,channel,dueMs;

  if(cycleNum===1){
    // Cycle 1: IG at +48h (only if handle exists), then main email at +168h
    const igDone=msgs.some(m=>m.ch==='ig'||m.ch==='instagram');
    const hasIg=!!(lead&&(lead.instagramHandle||lead.instagramUrl));
    if(!igDone&&hasIg){nextStep='DM Instagram';channel='ig';dueMs=anchorTs+ALT_DELAY;}
    else{nextStep='Follow-up email (ciclo 2)';channel='email';dueMs=anchorTs+CYCLE_LEN;}
  }else if(cycleNum===2){
    // Cycle 2: WhatsApp at +48h (only if phone exists), then main email at +168h
    const waDone=msgs.some(m=>(m.ch==='wa'||m.ch==='whatsapp')&&new Date(m.ts).getTime()>=lastMainTs);
    const hasPhone=!!(lead&&(lead.contactPhone||lead.apolloCompanyPhone));
    if(!waDone&&hasPhone){nextStep='WhatsApp';channel='wa';dueMs=lastMainTs+ALT_DELAY;}
    else{nextStep='Follow-up email (ciclo 3)';channel='email';dueMs=lastMainTs+CYCLE_LEN;}
  }else if(cycleNum<=4){
    // Cycles 3-4: only main every 7 days
    nextStep='Follow-up email (ciclo '+(cycleNum+1)+')';channel='email';dueMs=lastMainTs+CYCLE_LEN;
  }else{
    // After 4 cycles: monthly
    nextStep='Follow-up mensual';channel='email';dueMs=lastMainTs+MONTHLY_LEN;
  }

  const diff=dueMs-nowMs;
  let state,timeStr,color;

  if(diff>24*3600000){
    // GREEN: more than 24h away
    state='waiting';color='green';
    // Display rule: hours up to 48h, days only beyond. Avoids rounding 36h to "1d".
    if(diff>48*3600000){
      const d=Math.floor(diff/(24*3600000));
      timeStr='en '+d+'d';
    }else{
      const h=Math.floor(diff/3600000);
      timeStr='en '+h+'h';
    }
  }else if(diff>0){
    // YELLOW: within 24h of due
    state='due_soon';color='yellow';
    const h=Math.max(1,Math.floor(diff/3600000));
    timeStr='en '+h+'h';
  }else{
    // RED: due now or overdue (immediate — no 24h yellow grace period)
    state='overdue';color='red';
    const over=-diff;
    if(over<3600000)timeStr='ahora';
    else if(over<86400000)timeStr='hace '+Math.floor(over/3600000)+'h';
    else timeStr='hace '+Math.floor(over/(24*3600000))+'d';
  }

  return{active:true,step:{label:nextStep,channel},state,timeStr,color,dueMs,cycle:cycleNum};
}

// ═══ DATE-GATING: Timezone-aware activation (America/New_York) ═══
function gateLeads(leads){
  const nowET=new Date(new Date().toLocaleString('en-US',{timeZone:'America/New_York'}));
  const todayET=nowET.toISOString().slice(0,10);
  // Safety: ensure every lead has source_date. Missing → default to today ET.
  leads.forEach(l=>{if(!l.source_date)l.source_date=todayET;});
  const hourET=nowET.getHours();
  return leads.filter(l=>{
    if(l.source_date&&l.source_date>todayET){console.warn('[GATE] Blocked future lead:',l.companyName,l.source_date);return false}
    if(l.source_date===todayET&&hourET<8){console.warn('[GATE] Blocked pre-8AM-ET lead:',l.companyName);return false}
    if(l.approved===false){console.warn('[GATE] Blocked unapproved lead:',l.companyName);return false}
    return true;
  });
}

async function autoLoad(){
  if(typeof EMBEDDED_LEADS!=='undefined'&&EMBEDDED_LEADS&&EMBEDDED_LEADS.length){TL=gateLeads(EMBEDDED_LEADS);merge(TL);renderDay();return}
  // Cache-buster: JSON lead files are small and get overwritten every batch
  // activation. If the browser serves a cached copy, the card shows stale
  // contacts. Append ?v=<timestamp> so each page load pulls fresh data.
  const cb='?v='+Date.now();
  // Manifest-driven load is SCOPED to the default UnaBase workspace only.
  // The reports-manifest.json is written by the lead-gen pipeline which
  // targets unabase_default. Other workspaces (operator, eje, custom) have
  // their OWN leads file at CLIENT.leadsPath and must never inherit from
  // the UnaBase manifest — that would cross-contaminate lead data across
  // workspaces. See WORKSPACES registry at top of file.
  if(CLIENT_ID==='unabase_default'){
    try{
      const mr=await fetch('./reports-manifest.json'+cb);
      if(mr.ok){
        const manifest=await mr.json();
        const active=manifest.batches.find(b=>b.batch_id===manifest.active_batch_id);
        if(active&&active.file){
          const lr=await fetch('./'+active.file+cb);
          if(lr.ok){TL=gateLeads(await lr.json());if(TL.length){merge(TL);renderDay();return}}
        }
      }
    }catch{}
  }
  // Per-workspace leads file (always used for non-default; fallback for default)
  try{const r=await fetch(CLIENT.leadsPath+cb);if(r.ok){let raw=await r.json();TL=gateLeads(raw);merge(TL);renderDay();return}}catch{}
  const t=new Date();for(let o=0;o<3;o++){const d=new Date(t);d.setDate(d.getDate()-o);try{const r=await fetch('../output/leads-'+d.toISOString().slice(0,10)+'.json'+cb);if(r.ok){let raw=await r.json();TL=gateLeads(raw);merge(TL);renderDay();return}}catch{}}
  if(typeof SEED_HISTORY!=='undefined'&&SEED_HISTORY)merge(SEED_HISTORY);
  const a=allR();if(a.length){TL=a.filter(r=>r.lead).map(r=>r.lead);renderDay();toast('Desde memoria');return}
  document.getElementById('emptyS').style.display='block';
}

function renderDay(){
  document.getElementById('emptyS').style.display='none';
  // Awareness indicator — uses shared isActionable() so counter matches Acción Ahora exactly
  const indEl=document.getElementById('hoyIndicator');
  if(indEl){
    const seen=new Set();const pool=[...TL,...PL];
    let pending=0;
    pool.forEach(l=>{
      const dd=dom(l.website);if(!dd||seen.has(dd))return;seen.add(dd);
      if(isActionable(gr(dd),l).ok)pending++;
    });
    indEl.innerHTML=pending>0?`<div class="hoy-pending" onclick="showV('now')"><span>⚠️</span><strong>${pending}</strong> ${pending===1?'acción pendiente':'acciones pendientes'} en Acción Ahora</div>`:'';
  }
  // TAB SEPARATION RULE — Hoy vs Acción Ahora are mutually exclusive:
  //   • Hoy     = fresh leads with no sent-message anchor yet (first contact).
  //   • Acción Ahora = leads already in cycle (has rec.msgs), all follow-up
  //                    phases regardless of color.
  //   • Stopped leads (replied/meeting/closed/skip) live in Historial only.
  // This filter enforces the Hoy side of the rule. Acción Ahora has the
  // mirrored filter on its render function.
  const freshOnly=TL.filter(l=>{
    const d=dom(l.website);const rec=gr(d);
    if(SEQ_STOPS.includes(rec.st||'none'))return false;
    if((rec.msgs||[]).length>0)return false;
    return true;
  });
  // Sort by score (highest first) — all leads here share status 'none' (no msgs)
  const ord={none:0,partial:1,contacted:2,replied:3,meeting:4,closed:5,skip:6};
  const sorted=[...freshOnly].sort((a,b)=>{
    const sa=cSt(gr(dom(a.website))),sb=cSt(gr(dom(b.website)));
    if(ord[sa]!==ord[sb])return(ord[sa]||0)-(ord[sb]||0);
    return(b.unabaseScore||0)-(a.unabaseScore||0);
  });
  // Find first priority lead (first 'none' status)
  const priDom=sorted.find(l=>cSt(gr(dom(l.website)))==='none');
  const priId=priDom?dom(priDom.website):null;

  // Hoy "completed" state — NOT an empty app. Every lead of today's batch
  // already started the cycle; the user's momentum should transition to
  // Acción Ahora. Compact, top-aligned, directional — a progression cue,
  // not a dead zone.
  if(sorted.length===0&&TL.length>0){
    // Count in-cycle actions across TL + PL so the CTA shows real volume
    let urgent=0,upcoming=0;
    const pool=[...TL,...PL];const dedup=new Set();
    pool.forEach(l=>{
      const dd=dom(l.website);if(!dd||dedup.has(dd))return;dedup.add(dd);
      const rec=gr(dd);
      if((rec.msgs||[]).length===0)return;
      if(SEQ_STOPS.includes(rec.st||'none'))return;
      const fu=getFollowUp(rec,l);
      if(!fu.active||!fu.color)return;
      if(fu.color==='red'||fu.color==='yellow')urgent++;
      else if(fu.color==='green')upcoming++;
    });
    const total=urgent+upcoming;
    const subParts=[];
    if(urgent>0)subParts.push(`<strong>${urgent}</strong> ${urgent===1?'vencido/próximo':'vencidos o próximos'}`);
    if(upcoming>0)subParts.push(`<strong>${upcoming}</strong> en ciclo`);
    const subLine=subParts.length?subParts.join(' · '):'Sin acciones pendientes ahora.';
    document.getElementById('leadL').innerHTML=`<div class="hoy-done">
      <div class="hoy-done-icon">✓</div>
      <div class="hoy-done-body">
        <div class="hoy-done-title">${TL.length} lead${TL.length===1?'':'s'} de hoy ya ${TL.length===1?'está':'están'} en ciclo</div>
        <div class="hoy-done-sub">${subLine}</div>
      </div>
      ${total>0?`<button class="hoy-done-cta" onclick="showV('now')">Ir a Acción Ahora</button>`:''}
    </div>`;
    rM();return;
  }
  document.getElementById('leadL').innerHTML=sorted.map((l,i)=>{
    const d=dom(l.website);const rec=gr(d);const st=cSt(rec);const si=ST.indexOf(st);
    const first=l.contactName?l.contactName.split(/\s+/)[0]:'Equipo';
    // Counter reflects the CURRENT single due task (not legacy multi-step).
    // - Stopped (replied/meeting/closed/skip): 1/1
    // - No outreach yet: 0/1
    // - Just contacted (grace period, no new task due): 1/1
    // - Next cycle task due: 0/1
    const _hasAnyAct=((rec.acts||[]).length>0)||((rec.msgs||[]).length>0);
    const _stopped=SEQ_STOPS.includes(rec.st||'none');
    const total=1;
    const done=_stopped?1:(!_hasAnyAct?0:(isActionable(rec,l).ok?0:1));
    const scCls=done===total?'sc-done':'sc-none';
    const isPri=d===priId;
    let fu=getFollowUp(rec,l,'hoy');
    // Safety net (no-op now since getFollowUp always returns active for non-stopped leads)
    if(!fu.active&&fu.reason==='no_outreach'){fu={active:true,color:'green',step:{label:'Email inicial'},state:'waiting',timeStr:'ahora'};}
    const fuCls=fu.active&&fu.color?'fu-'+fu.color:'';
    const adjTime=adjustTimeStr(fu,l.country);
    const fuTag=fu.active&&fu.state?`<div class="fu-tag ${fu.color}">${fu.step.label} · ${adjTime}</div>`:'';
    return`<div class="lead${si>=2?' dn':''}${isPri?' priority':''} ${fuCls}" onclick="openPB('${d}')">
      ${isPri?'<div class="pri-tag">Siguiente</div>':''}
      <div class="lh">
        <div class="lh-scorebadge">${l.unabaseScore||'?'}/10</div>
        <div class="lc">${esc(l.companyName)}</div>
        <div class="lh-sub"><strong>${esc(first)}</strong>${l.contactTitle?` · <span style="color:var(--pp)">${esc(l.contactTitle)}</span>`:''} · ${esc(l.country)}</div>
        <div class="lh-score ${scCls}">${done} / ${total}</div>
        <div class="ls s${si}">${SL[si]}</div>
        ${fuTag}
        <button class="lh-pb" onclick="event.stopPropagation();openPB('${d}')">Playbook</button>
      </div>
    </div>`;
  }).join('');
  rM();
}

// ═══ PLAYBOOK OVERLAY ═══
// ═══════════════════════════════════════════════════════════════════════════
// LOCKED EXECUTION CYCLE  — do NOT bend these rules from the render layer.
// ───────────────────────────────────────────────────────────────────────────
// This function is the single source of truth for what Paso 1, Refuerzo, and
// Paso 2 are for a given lead. The UI is a thin consumer of its output.
// Future UI changes must never reach into this function to redefine the cycle.
//
//   R1. Email is Paso 1 whenever contactEmail is usable.
//   R2. If email is NOT usable (masked / empty) but Instagram IS, Paso 1
//       pivots to IG DM. (Canonical case: Zeta Positivo.)
//   R3. LinkedIn is the ONLY valid same-day refuerzo. It renders when:
//         (a) Paso 1 is email, AND
//         (b) A personal LinkedIn URL exists on the primary contact OR in any
//             additionalContacts entry (company LinkedIn is NEVER accepted), AND
//         (c) A pre-authored linkedinMessage is present.
//   R4. Instagram / WhatsApp / phone call are NEVER refuerzos. They live
//       exclusively in Paso 2 (the 48h cycle) when they are the primary path.
//   R5. Paso 2 is CONDITIONAL — only fires if no response arrived.
//   R6. isDone on each step derives from rec.acts. The checkbox in the UI
//       toggles rec.acts via tA(); the UI never sets visual state directly.
//   R7. When the lead is in a stopped status (replied / meeting / closed /
//       skip) this function returns null cycle — no Paso 1, Refuerzo, Paso 2.
// ═══════════════════════════════════════════════════════════════════════════
function computeExecutionCycle(rec, lead) {
  const fu = getFollowUp(rec, lead);
  if (!fu.active || !fu.step || !fu.step.channel) {
    return { paso1: null, refuerzo: null, paso2: null };
  }
  let channel = fu.step.channel;
  const emailUsable = !!(lead.contactEmail && String(lead.contactEmail).trim());
  const hasIg = !!(lead.instagramUrl || lead.instagramHandle);
  // R2 — pivot
  if (channel === 'email' && !emailUsable && hasIg) channel = 'ig';
  const isFollowUp = fu.cycle >= 2;
  const ig = lead.instagramHandle || (lead.instagramUrl ? (lead.instagramUrl.match(/instagram\.com\/([^/]+)/) || [])[1] : null);
  const phone = lead.contactPhone || lead.apolloCompanyPhone;
  const first = lead.contactName ? lead.contactName.split(/\s+/)[0] : null;
  const hasPriorMsg = (rec.msgs || []).length > 0;

  // ─── Paso 1 ─────────────────────────────────────────────────────────
  const paso1 = { channel, isFollowUp, color: fu.color, time: fu.timeStr };

  if (channel === 'ig' || channel === 'instagram') {
    const handle = ig || lead.founderInstagramHandle || '';
    paso1.channelKey = 'ig';
    paso1.title = 'Enviar DM ahora';
    paso1.actionLabel = 'Ya envié el DM';
    paso1.doneLabel = 'DM enviado';
    paso1.targetKind = 'Instagram DM';
    paso1.targetLabel = '@' + handle;
    paso1.targetLineHTML = `Instagram DM → <strong>@${esc(handle)}</strong>`;
    paso1.message = (lead.emailCercana && !hasPriorMsg)
      ? lead.emailCercana
      : 'Hola, ¿cómo están? Soy Scarlett de UnaBase.\nLes escribimos por Instagram porque les enviamos un mail hace un par de días desde UnaBase y quería asegurarme de que lo hayan visto.\n\nSi prefieren, les resumo todo por acá sin problema.';
  } else if (channel === 'wa' || channel === 'whatsapp') {
    paso1.channelKey = 'wa';
    paso1.title = 'Enviar WhatsApp ahora';
    paso1.actionLabel = 'Ya envié el WhatsApp';
    paso1.doneLabel = 'WhatsApp enviado';
    paso1.targetKind = 'WhatsApp';
    paso1.targetLabel = phone || '';
    paso1.targetLineHTML = `WhatsApp → <strong>${esc(phone || '')}</strong>`;
    paso1.message = 'Hola, ¿cómo están? Soy Scarlett de UnaBase.\nLes escribimos por WhatsApp porque les enviamos un mail hace un par de días desde UnaBase y quería asegurarme de que lo hayan visto.\n\nSi prefieren, les resumo todo por acá sin problema.';
  } else {
    paso1.channelKey = 'email';
    paso1.title = 'Enviar email ahora';
    paso1.actionLabel = 'Ya envié el email';
    paso1.doneLabel = 'Email enviado';
    paso1.targetKind = 'Email';
    paso1.targetLabel = lead.contactEmail || '';
    const GENERIC_RE = /^(info|contact|contacto|hello|hola|admin|support|help|noreply|no-reply|ventas|sales|press|prensa|rrhh|hr|jobs|billing|webmaster|postmaster|booking|reservas|general|oficina|office|produccion|production|direccion|equipo|team|comercial|marketing|contactanos)@/i;
    const fullEmail = (lead.contactEmail || '').toLowerCase();
    const localPart = fullEmail.split('@')[0] || '';
    const isFreeProvider = /@(gmail|hotmail|yahoo|outlook|icloud|live)\./i.test(fullEmail);
    const nameParts = (lead.contactName || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').split(/\s+/).filter(p => p.length > 2);
    const nameInLocal = nameParts.length > 0 && nameParts.some(p => localPart.includes(p));
    const isGeneric = !fullEmail || GENERIC_RE.test(fullEmail) || (isFreeProvider && !nameInLocal);
    const hasName = !!lead.contactName;
    const who = (hasName && !isGeneric) ? first : 'equipo';
    paso1.targetLineHTML = `Email → <strong>${esc(lead.contactEmail || '')}</strong> <span class="step-who">(${esc(who)})</span>`;
    let greeting;
    if (hasName && !isGeneric) greeting = isFollowUp ? 'Hola ' + first + ',' : 'Hola ' + first + ', ¿cómo estás?';
    else if (hasName && isGeneric) greeting = '¿Es esta la mejor manera de contactar a ' + lead.contactName + '?';
    else greeting = 'Hola equipo de ' + lead.companyName + ',';
    if (isFollowUp) {
      paso1.message = greeting + '\n\nTe escribí hace unos días sobre UnaBase. Quería ver si tuviste chance de revisarlo.\n\nSi prefieres, podemos hacer una llamada rápida de 10 min para que te muestre cómo otras productoras están manejando su presupuestación.\n\nScarlett';
    } else if (lead.emailCercana) {
      paso1.message = lead.emailCercana;
    } else {
      paso1.message = 'Asunto: Una pregunta rápida sobre cómo manejan presupuestos\n\n' + greeting + '\n\nEstuve viendo ' + lead.companyName + ' y el tipo de proyectos que manejan.\n\nTe hago una pregunta rápida.\n¿Cómo están organizando hoy los presupuestos cuando tienen varios proyectos corriendo al mismo tiempo?\n\nLo pregunto porque muchas productoras terminan manejándolo en Excel, notas sueltas o mil versiones distintas, y se vuelve difícil tener claridad real.\n\nEn UnaBase armamos un sistema justamente para eso, ordenar y visualizar presupuestos de producción sin fricción.\n\nSi te hace sentido, te muestro en 10 min cómo lo están usando otras productoras.';
    }
  }
  paso1.isDone = (rec.acts || []).includes(paso1.channelKey);

  // ─── Refuerzo (R3 + R4) ────────────────────────────────────────────
  let refuerzo = null;
  if (paso1.channelKey === 'email' && lead.linkedinMessage) {
    const liUrl = lead.contactLinkedIn
      || ((lead.additionalContacts || []).find(c => c.contactLinkedIn) || {}).contactLinkedIn
      || null;
    const liName = lead.contactLinkedIn
      ? lead.contactName
      : (((lead.additionalContacts || []).find(c => c.contactLinkedIn) || {}).contactName || lead.contactName || '');
    if (liUrl && /linkedin\.com/i.test(liUrl)) {
      refuerzo = {
        channelKey: 'li',
        target: liUrl,
        targetName: liName,
        message: lead.linkedinMessage,
        isDone: (rec.acts || []).includes('li'),
        actionLabel: 'Ya envié el LinkedIn',
        doneLabel: 'LinkedIn enviado',
      };
    } else if (liUrl) {
      console.error('[cycle] R3 violation: refuerzo URL is not LinkedIn:', liUrl);
    }
  }

  // ─── Paso 2 (R5) ───────────────────────────────────────────────────
  const day23 = lead.executionCycle && lead.executionCycle.day23;
  const paso2Body = day23 || (
    paso1.channelKey === 'email' ? 'Follow-up corto por el mismo canal si no hubo respuesta.' :
    paso1.channelKey === 'ig' ? 'Segundo DM breve referenciando el primero.' :
    paso1.channelKey === 'wa' ? 'Segundo WhatsApp breve referenciando el primero.' : ''
  );
  const paso2 = { body: paso2Body, when: '48h', conditional: true };

  return { paso1, refuerzo, paso2 };
}

// Tab persistence across playbook open/close — remembers which tab the user
// was on before opening a lead and restores it on close. Without this, any
// caller that happened to switch tabs before calling openPB() (or any future
// rendering side-effect) could leave the user stranded on the wrong tab.
let _pbOriginTab=null;
function openPB(d){
  let l=TL.find(x=>dom(x.website)===d)||PL.find(x=>dom(x.website)===d);
  if(!l){const rec=gr(d);if(rec.lead){l=rec.lead;TL.push(l)}else return}
  const rec=gr(d);const steps=getSteps(l);const fu=steps.findIndex(s=>!(rec.acts||[]).includes(s.id));
  // Counter: single current task. Same rule as Hoy card — grace period = done.
  const _hasAnyActPB=((rec.acts||[]).length>0)||((rec.msgs||[]).length>0);
  const _stoppedPB=SEQ_STOPS.includes(rec.st||'none');
  const total=1;const done=_stoppedPB?1:(!_hasAnyActPB?0:(isActionable(rec,l).ok?0:1));
  const name=l.contactName||'Equipo';const ig=l.instagramHandle||(l.instagramUrl?(l.instagramUrl.match(/instagram\.com\/([^/]+)/)||[])[1]:null);
  const scCls=done===total?'sc-done':'sc-none';

  let chs='';
  if(l.contactEmail)chs+=`<a href="mailto:${esc(l.contactEmail)}" class="ch ce">${esc(l.contactEmail)}</a>`;
  if(ig)chs+=`<a href="${esc(l.instagramUrl||'')}" target="_blank" class="ch ci">@${esc(ig)}</a>`;
  if(l.founderInstagramHandle&&l.founderInstagramHandle!==ig)chs+=`<a href="${esc(l.founderInstagramUrl||('https://www.instagram.com/'+l.founderInstagramHandle+'/'))}" target="_blank" class="ch ci">@${esc(l.founderInstagramHandle)}</a>`;
  if(l.contactPhone||l.apolloCompanyPhone)chs+=`<span class="ch cph">${esc(l.contactPhone||l.apolloCompanyPhone)}</span>`;
  if(l.contactLinkedIn||l.apolloCompanyLinkedIn)chs+=`<a href="${esc(l.contactLinkedIn||l.apolloCompanyLinkedIn)}" target="_blank" class="ch cl">LinkedIn</a>`;
  // If primary needs a manual Contact-button check (no personal email/phone surfaced yet),
  // flag it inline. BUT if the IG profile is private (igIsPrivate), the Contact
  // button path is unreachable — suppress the warning and point to LinkedIn/press.
  const primaryManualFlag=(l.primaryNeedsManualContactButtonCheck&&!l.igIsPrivate)?'<div class="dm-flag">⚠️ Revisar botón Contact en IG móvil del fundador para email/tel directo</div>':(l.igIsPrivate?'<div class="dm-flag" style="color:var(--mt)">IG privado — usar LinkedIn / press / Hunter para contacto directo</div>':'');
  const tags=[...(l.notableClients||[]).slice(0,3),l.industry?.toUpperCase()].filter(Boolean).map(t=>`<span class="tag">${esc(t)}</span>`).join('');

  // ═══ NEXT ACTION SYSTEM ═══
  // Pure cycle computation lives in computeExecutionCycle (above openPB).
  // This block is purely RENDER — it must not redefine the rules.
  const cycle = computeExecutionCycle(rec, l);
  const phonePB=l.contactPhone||l.apolloCompanyPhone;   // used by legacy strategy/accordion blocks
  const firstPB=l.contactName?l.contactName.split(/\s+/)[0]:null;

  let actionSection='';
  if(cycle.paso1){
    const p1=cycle.paso1;
    const adjustedTime=adjustTimeStr({color:p1.color,timeStr:p1.time},l.country);
    const ck=p1.channelKey;

// ═══ ACTIONS ═══
async function tA(d,aid,ch){
  console.log('[tA] click',{d,aid,ch});
  const rec=gr(d);
  const acts=[...(rec.acts||[])];
  const tl=[...(rec.tl||[])];
  let msgs=[...(rec.msgs||[])];
  const idx=acts.indexOf(aid);
  const completed=idx<0;
  // Track cycle anchor additions/removals so Supabase stays in sync.
  let autoAnchorToPush=null;          // new anchor msg to persist
  let autoAnchorsToDelete=[];         // previously-persisted auto anchors to clean up on uncheck
  if(idx>=0){
    // UNCHECK: remove the action AND any auto-anchor msg we inserted for
    // this channel. Real user-saved messages (pasted via sM) are preserved
    // because they have different tx content.
    acts.splice(idx,1);
    tl.push({tp:'act',desc:'Desmarcó: '+ch,ts:now()});
    autoAnchorsToDelete=msgs.filter(m=>m.ch===ch && m.tx===AUTO_ANCHOR_TX).map(m=>m.ts);
    msgs=msgs.filter(m=>!(m.ch===ch && m.tx===AUTO_ANCHOR_TX));
  }else{
    // CHECK: mark the action complete. If no message with a timestamp exists
    // yet for this channel, insert a lightweight auto-anchor so the
    // follow-up engine (getFollowUp) has a valid anchor to compute +48h /
    // +168h from. Without this, the engine falls into the "no msgs" branch
    // and returns RED "Guardar mensaje enviado — ahora" instead of letting
    // the cycle run. The optional "Guardar mensaje enviado" flow still
    // exists for operators who want the real body on record.
    acts.push(aid);
    tl.push({tp:'act',desc:'Completó: '+ch,ts:now()});
    if(!msgs.some(m=>m.ch===ch)){
      const ts=now();
      autoAnchorToPush={ch,tx:AUTO_ANCHOR_TX,ts};
      msgs.push(autoAnchorToPush);
      tl.push({tp:'msg',desc:'Anclaje de ciclo ('+ch+')',ts});
    }
  }
  const ns=cSt({...rec,acts,msgs});
  if(ns!==cSt(rec))tl.push({tp:'st',desc:'Estado → '+SL[ST.indexOf(ns)],ts:now()});
  ur(d,{acts,msgs,st:ns,tl});
  // Supabase persistence
  const actOk=await sbLogAction(d,ch,completed);
  let msgOk=true;
  if(autoAnchorToPush){
    msgOk=await sbLogMessage(d,ch,AUTO_ANCHOR_TX);
  }
  // Clean up auto-anchors from Supabase when unchecking (keeps multi-device sync aligned)
  for(const ts of autoAnchorsToDelete){
    try{await sbDeleteMessage(d,ts)}catch{}
  }
  console.log('[tA] write',{d,ch,completed,actOk,anchored:!!autoAnchorToPush,cleaned:autoAnchorsToDelete.length,msgOk});
  toast(actOk?(completed?'+1 acción completada':'Desmarcado'):'⚠️ No se pudo sincronizar — intenta de nuevo');
  refresh();
}
async function sM(d,aid,ch){
  const ta=document.getElementById('sa-'+d+'-'+aid);
  if(!ta||!ta.value.trim()){console.log('[sM] empty, abort',{d,aid,ch});return}
  console.log('[sM] click',{d,aid,ch});
  const rec=gr(d);const msgs=[...(rec.msgs||[])];const tl=[...(rec.tl||[])];const acts=[...(rec.acts||[])];
  const msgText=ta.value.trim();
  const ts=now();
  msgs.push({ch,tx:msgText,ts});
  tl.push({tp:'msg',desc:'Mensaje por '+ch,ts});
  // CRITICAL: saving a message IS completing the action for that channel
  let actAdded=false;
  if(!acts.includes(ch)){acts.push(ch);actAdded=true;tl.push({tp:'act',desc:'Completó: '+ch,ts});}
  const newSt=cSt({...rec,acts,msgs});
  ur(d,{msgs,tl,acts,st:newSt});ta.value='';
  // Persist to Supabase with error visibility
  const msgOk=await sbLogMessage(d,ch,msgText);
  let actOk=true;if(actAdded)actOk=await sbLogAction(d,ch,true);
  console.log('[sM] write',{d,ch,msgOk,actOk,actAdded});
  toast((msgOk&&actOk)?'Mensaje guardado ✓':'⚠️ Guardado local OK, error en Supabase — revisa consola');
  refresh();
}
async function sS(d,status){
  console.log('[sS] click',{d,status});

  tl.push({tp:'st',desc:'Estado → '+SL[ST.indexOf(status)],ts:now()});

}

// ═══ METRICS + GLOBAL PROGRESS ═══
// Counter scoping:
//   • Non-terminal states (SIN CONTACTAR / PARCIAL / CONTACTADO) are scoped to
//     TL (today's batch) — they represent PROGRESS on today's outreach.
//   • Terminal states (RESPONDIÓ / REUNIÓN / CERRADO) are counted across ALL
//     approved leads — they represent LIFECYCLE conversions that can land any
//     time from any batch. A reply on a lead from last week's batch still
//     needs to show up in today's RESPONDIÓ count.
function rM(){
  const c={};ST.forEach(s=>c[s]=0);let totalActs=0,doneActs=0,completedLeads=0;
  // Pass 1: Today's batch — count non-terminal states + progress bar
  TL.forEach(l=>{const d=dom(l.website);const rec=gr(d);const s=cSt(rec);
    if(['none','partial','contacted'].includes(s))c[s]=(c[s]||0)+1;
    const steps=getSteps(l);totalActs+=steps.length;
    const dn=steps.filter(s=>(rec.acts||[]).includes(s.id)).length;doneActs+=dn;
    if(s!=='none')completedLeads++;
  });
  // Pass 2: Terminal states across all APPROVED leads (TL + PL + SEED_PAST)
  const approved=new Set();
  TL.forEach(l=>{const d=dom(l.website);if(d)approved.add(d)});
  PL.forEach(l=>{const d=dom(l.website);if(d)approved.add(d)});
  if(typeof SEED_PAST!=='undefined'&&SEED_PAST)SEED_PAST.forEach(l=>{const d=dom(l.website);if(d)approved.add(d)});
  allR().forEach(r=>{
    if(!approved.has(r.id))return;
    const s=cSt(r);
    if(['replied','meeting','closed'].includes(s))c[s]=(c[s]||0)+1;
  });
  const show=[['none',0],['partial',1],['contacted',2],['replied',3],['meeting',4],['closed',5]];
  document.getElementById('mB').innerHTML=show.map(([k,mi])=>`<div class="m"><div class="m-v mc${mi}">${c[k]||0}</div><div class="m-l">${SL[ST.indexOf(k)]}</div></div>`).join('');
  const pct=TL.length?Math.round(completedLeads/TL.length*100):0;
  document.getElementById('gpDone').textContent=completedLeads;
  document.getElementById('gpTotal').textContent=TL.length;
  document.getElementById('gpFill').style.width=pct+'%';
  document.getElementById('gpPct').textContent=pct+'%';
}

// ═══ HISTORY ═══
function rHist(q){
  // APPROVED-ONLY GATE: Historial must only show leads that entered "the system"
  // via an approved batch (current Hoy batch, any archived batch in leads-past.json,
  // or the first-run SEED_PAST). Raw Supabase records from discovery/enrichment runs
  // stay in the memory pool (Supabase) and are invisible here until approved.
  const approved=new Set();
  TL.forEach(l=>{const d=dom(l.website);if(d)approved.add(d)});
  PL.forEach(l=>{const d=dom(l.website);if(d)approved.add(d)});
  if(typeof SEED_PAST!=='undefined'&&SEED_PAST)SEED_PAST.forEach(l=>{const d=dom(l.website);if(d)approved.add(d)});
  const all=allR().filter(r=>approved.has(r.id));
  const f=q?all.filter(r=>r.co.toLowerCase().includes(q.toLowerCase())):all;
  // Show all status groups (including uncontacted) — except "skip" (omitir/descartar).
  const groups={none:[],partial:[],contacted:[],replied:[],meeting:[],closed:[]};
  f.forEach(r=>{const s=cSt(r);if(s==='skip')return;if(groups[s])groups[s].push(r)});
  let h='';
  [['none','Sin contactar'],['partial','En progreso'],['contacted','Contactados'],['replied','Respondieron'],['meeting','Reunión'],['closed','Cerrados']].forEach(([k,label])=>{
    const items=groups[k]||[];if(!items.length)return;
    // Sort by most recent activity (up timestamp) desc
    items.sort((a,b)=>new Date(b.up||0)-new Date(a.up||0));
    h+=`<div class="hg"><div class="hg-t">${label}<span class="hg-c">${items.length}</span></div>`;
    items.forEach(r=>{const a=(r.acts||[]).length;const m=(r.msgs||[]).length;
      h+=`<div class="hi" onclick="oH('${r.id}')"><div class="hi-n">${esc(r.co)}</div><div class="hi-a">${a} acc · ${m} msgs</div><div class="hi-d">${r.up?r.up.slice(0,10):''}</div></div>`});
    h+='</div>';
  });
  if(!h)h='<div style="text-align:center;color:var(--dm);padding:40px;font-size:12px">No hay leads en memoria todavía.</div>';
  document.getElementById('histL').innerHTML=h;
}
function oH(id){const rec=gr(id);if(!rec.lead)return;if(!TL.find(l=>dom(l.website)===id)){TL.push(rec.lead);renderDay()}setTimeout(()=>openPB(id),100)}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800)}

// ═══ PAST LEADS ═══
let pastLoaded=false;
async function loadPast(){
  if(pastLoaded)return;
  PL=[];
  // Past-batch archive is SCOPED to the default UnaBase workspace. The file
  // `leads-past.json` and the SEED_PAST constant are both UnaBase-specific
  // data written by its activate-batch.js flow. Other workspaces (operator,
  // eje, custom) must not inherit UnaBase's historical leads — that would
  // cross-contaminate Historial / Acción Ahora with leads tagged for the
  // wrong client_id. Each workspace builds its own PL from its own data.
  if(CLIENT_ID==='unabase_default'){
    try{const r=await fetch('./leads-past.json?v='+Date.now());if(r.ok){const past=await r.json();past.forEach(l=>{l._batchDate=l.source_date||'2026-04-14'});PL.push(...past)}}catch{}
    if(typeof SEED_PAST!=='undefined'&&SEED_PAST&&SEED_PAST.length){
      SEED_PAST.forEach(l=>{l._batchDate=l.source_date||'2026-04-13'});
      const existing=new Set(PL.map(l=>dom(l.website)));
      SEED_PAST.filter(l=>!existing.has(dom(l.website))).forEach(l=>PL.push(l));
    }
  }
  merge(PL);
  pastLoaded=true;
}
// Single source of truth for "is this lead actionable right now?"
// Used by both the Hoy awareness counter AND Acción Ahora queue so they stay in sync.
// A lead is actionable only if ALL are true:
//   1. Status is not stopped (replied/meeting/closed/skip)
//   2. Last message was NOT within 24h (grace period — just-contacted leads aren't due yet)
//   3. Follow-up color is RED or YELLOW
function isActionable(rec, lead) {
  const st = rec.st || 'none';
  if (SEQ_STOPS.includes(st)) return { ok: false };
  // Grace period: if most recent message is within 24h, not actionable yet
  const msgTs = (rec.msgs || []).map(m => new Date(m.ts).getTime()).filter(t => !isNaN(t));
  if (msgTs.length) {
    const lastMs = Math.max.apply(null, msgTs);
    if (Date.now() - lastMs < 24 * 3600000) return { ok: false, reason: 'grace_24h' };
  }
  // Compute fu (apply past-lead default yellow if needed)
  let fu = getFollowUp(rec, lead, lead && lead._batchDate ? 'past' : 'hoy');
  if (!fu.active && lead && lead._batchDate && !SEQ_STOPS.includes(st)) {
    fu = { active: true, color: 'yellow', step: { label: 'Contactar', channel: 'email' }, state: 'due_soon', timeStr: 'pendiente', dueMs: Date.now() };
  }
  if (!fu.active || !fu.color) return { ok: false };
  if (fu.color !== 'red' && fu.color !== 'yellow') return { ok: false };
  return { ok: true, fu };
}

// ═══ ACCIÓN AHORA — focused execution queue ═══
// Pulls actionable leads from BOTH today's batch (TL) and past batches (PL).
// Filters: only RED + YELLOW (urgent now). Hides green, replied, meeting, closed, skip,
// and leads contacted within 24h (grace period).
// Caps at 4. Sort: RED → YELLOW, then by dueMs ascending (most urgent first).
function actionTypeLabel(fu){
  if(!fu||!fu.step)return '';
  const ch=fu.step.channel;
  if(ch==='ig'||ch==='instagram')return 'DM Instagram';
  if(ch==='wa'||ch==='whatsapp')return 'WhatsApp';
  if(ch==='email')return fu.cycle>=2?'Follow-up Email':'Email';
  return fu.step.label||'';
}
function renderAccionAhora(){
  const el=document.getElementById('nowL');
  if(!el)return;
  // TAB SEPARATION RULE — mirror of the renderDay filter.
  //   Acción Ahora shows ONLY leads that have already started the cycle
  //   (rec.msgs has at least one entry) and are not stopped. Hoy shows
  //   fresh first-contact leads. A lead never appears in both tabs.
  //   All colors render here (RED due now → GREEN upcoming), sorted by
  //   urgency so the operator sees what needs action first.
  const pool=[...TL,...PL];
  const seen=new Set();
  const deduped=pool.filter(l=>{const dd=dom(l.website);if(!dd||seen.has(dd))return false;seen.add(dd);return true});
  const COLOR_PRI={red:0,yellow:1,green:2};
  const items=deduped.map(l=>{
    const dd=dom(l.website);const rec=gr(dd);
    // Must be in cycle
    if((rec.msgs||[]).length===0)return null;
    // Must not be in a terminal state
    if(SEQ_STOPS.includes(rec.st||'none'))return null;
    // Compute follow-up state — if engine says inactive (shouldn't happen
    // for in-cycle leads but just in case), skip.
    const fu=getFollowUp(rec,l,lead=>lead&&lead._batchDate?'past':'hoy');
    if(!fu.active||!fu.step)return null;
    return {lead:l,rec,d:dd,fu};
  }).filter(Boolean);
  // Sort: RED first (overdue), YELLOW second (due soon), GREEN last (upcoming).
  // Within same color, earliest due first.
  items.sort((a,b)=>{
    const ca=COLOR_PRI[a.fu.color]??3,cb=COLOR_PRI[b.fu.color]??3;
    if(ca!==cb)return ca-cb;
    return (a.fu.dueMs||0)-(b.fu.dueMs||0);
  });
  // Cap visible at 4 urgent + preview of upcoming. Rest counted as queued.
  const urgent=items.filter(i=>i.fu.color==='red'||i.fu.color==='yellow');
  const upcoming=items.filter(i=>i.fu.color==='green');
  const visibleUrgent=urgent.slice(0,4);
  const visibleUpcoming=urgent.length<4?upcoming.slice(0,4-urgent.length):[];
  const visible=[...visibleUrgent,...visibleUpcoming];
  const queued=items.length-visible.length;
  if(!visible.length){
    el.innerHTML='<div class="aa-empty"><div class="aa-empty-icon">✓</div>No hay leads en ciclo todavía. Contactá a los de Hoy para arrancar.</div>';
    return;
  }
  let html='<div class="aa-grid">';
  visible.forEach(({lead:l,d,fu})=>{
    const urgency=fu.color==='red'?'<div class="aa-urgency red">VENCIDO</div>'
                 :fu.color==='yellow'?'<div class="aa-urgency yellow">PRONTO</div>'
                 :'<div class="aa-urgency green">EN CICLO</div>';
    const actType=actionTypeLabel(fu);
    const adjT=adjustTimeStr(fu,l.country);
    html+=`<div class="aa-card fu-${fu.color}" onclick="openPB('${d}')">
      ${urgency}
      <div class="aa-company">${esc(l.companyName)}</div>
      <div class="aa-action">${esc(actType)}</div>
      <div class="aa-time ${fu.color}">${esc(adjT.toUpperCase())}</div>
      <button class="aa-cta" onclick="event.stopPropagation();openPB('${d}')">Abrir</button>
    </div>`;
  });
  html+='</div>';
  if(queued>0)html+=`<div class="aa-queue-info">+${queued} en cola</div>`;
  el.innerHTML=html;
}

// renderPast() removed — Leads Anteriores tab no longer exists.
// loadPast() and PL still used: PL feeds Acción Ahora (which aggregates today + past).

document.getElementById('cN').textContent=CLIENT.name;
document.getElementById('nD').textContent=new Date().toISOString().slice(0,10);
// Workspace tag
// Workspace badge — driven by the WORKSPACES registry above. Default client
// renders no badge; every other workspace gets its configured color + the
// CLIENT_ID as the badge text so there's never confusion about which
// workspace is active.
const wsEl=document.getElementById('wsTag');
if(WS.badgeColor){
  wsEl.textContent=CLIENT_ID;
  wsEl.style.background=WS.badgeColor;
  wsEl.style.color='#fff';
}else{
  wsEl.style.display='none';
}
document.documentElement.style.setProperty('--accent',CLIENT.accent);
document.addEventListener('click',e=>{if(!e.target.closest('.n-user'))document.querySelector('.n-udd')?.classList.remove('open')});
document.getElementById('pbO').addEventListener('click',e=>{if(e.target===document.getElementById('pbO'))closePB()});
// Init: load Supabase + past leads (PL feeds awareness indicator + Acción Ahora) + autoLoad today
// Default landing tab = Hoy. autoLoad calls renderDay which now also computes the awareness indicator.
sbLoadAll().then(()=>loadPast().then(()=>autoLoad().then(()=>{renderAccionAhora();renderDay();})));
</script>
